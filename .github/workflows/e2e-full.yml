name: E2E Full

on:
  schedule:
    - cron: "0 4 * * *"
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      layers:
        description: "Marker expression (e.g. 'agent_session', 'publish')"
        required: false
        default: "e2e"

jobs:
  e2e-agents:
    name: E2E (${{ matrix.os }}, ${{ matrix.agent }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        agent: [claude-code, openclaw]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --group e2e

      - name: Install agent CLI
        run: >
          npm install -g ${{
            matrix.agent == 'claude-code'
            && '@anthropic-ai/claude-code'
            || 'openclaw'
          }}

      - name: Run E2E tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >
          uv run pytest tests/e2e/
          -m "platform or agent_cli or agent_session"
          --agent ${{ matrix.agent }}
          --junit-xml=e2e-full-results.xml
          --timeout=300
          --reruns 1 --reruns-delay 5
          -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-${{ matrix.os }}-${{ matrix.agent }}
          path: e2e-full-results.xml

  e2e-hub-integration:
    name: IpHub Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --group e2e

      - name: Run IpHub integration tests (Phase 2)
        env:
          IPHUB_REPO: ${{ vars.IPHUB_REPO }}
        run: >
          uv run pytest tests/e2e/test_hub_integration.py
          -m "network"
          --junit-xml=hub-integration-results.xml
          --reruns 2 --reruns-delay 5
          -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-hub-integration
          path: hub-integration-results.xml

  e2e-publish-security:
    name: Publish Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --group e2e

      - name: Run publish security tests
        env:
          GH_TOKEN_OWNER: ${{ secrets.GH_TOKEN_OWNER }}
          GH_TOKEN_USER_A: ${{ secrets.GH_TOKEN_USER_A }}
          GH_TOKEN_USER_B: ${{ secrets.GH_TOKEN_USER_B }}
          IPHUB_REPO: ${{ vars.IPHUB_REPO }}
        run: >
          uv run pytest tests/e2e/test_publish_workflow.py
          -m "publish"
          --junit-xml=publish-results.xml
          --timeout=300
          --reruns 2 --reruns-delay 10
          -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-publish-security
          path: publish-results.xml
