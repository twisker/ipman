name: Publish to PyPI + Build Binaries

on:
  push:
    tags: ["v*"]

jobs:
  # --- Job 1: Generate changelog + create GitHub Release ---
  release:
    name: Create Release with Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-cliff

      - name: Generate changelog for this release
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG-release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG-release.md

  # --- Job 2: PyPI publish ---
  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # --- Job 3: Multi-platform binaries ---
  binaries:
    name: Build ${{ matrix.os }} binary
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ipman-linux-x64
            ext: ""
          - os: macos-latest
            artifact: ipman-macos-arm64
            ext: ""
          - os: windows-latest
            artifact: ipman-windows-x64
            ext: ".exe"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build binary
        run: >
          uv run pyinstaller
          --onefile
          --name ipman
          --paths src
          scripts/pyinstaller-entry.py

      - name: Rename artifact
        shell: bash
        run: |
          mv dist/ipman${{ matrix.ext }} dist/${{ matrix.artifact }}${{ matrix.ext }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}${{ matrix.ext }}
