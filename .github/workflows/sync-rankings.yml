# Fetch ranking tables from iphub repo and inject into README
# Runs daily after iphub's update-stats, or manually

name: Sync Rankings

on:
  schedule:
    - cron: "0 3 * * *"  # 1 hour after iphub update-stats
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    name: Embed IpHub Rankings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ranking files from iphub
        run: |
          BASE="https://raw.githubusercontent.com/twisker/iphub/main/stats"
          mkdir -p /tmp/rankings
          curl -sSf "$BASE/top-10-skills.md"   -o /tmp/rankings/top-10-skills.md   || true
          curl -sSf "$BASE/top-10-packages.md" -o /tmp/rankings/top-10-packages.md || true

      - name: Inject into README
        run: |
          inject() {
            local marker="$1" file="$2"
            if grep -q "<!-- ${marker}_START -->" README.md && [ -f "$file" ]; then
              awk -v start="<!-- ${marker}_START -->" \
                  -v end="<!-- ${marker}_END -->" \
                  -v file="$file" '
                $0 == start { print; system("cat " file); skip=1; next }
                $0 == end   { skip=0 }
                !skip       { print }
              ' README.md > README.tmp && mv README.tmp README.md
            fi
          }

          inject "TOP_SKILLS"   /tmp/rankings/top-10-skills.md
          inject "TOP_PACKAGES" /tmp/rankings/top-10-packages.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: sync IpHub rankings [skip ci]"
          git push
