# GitHub Actions workflow for twisker/iphub repo
# Validates and auto-merges publish PRs
#
# Checks:
#   1. PR only modifies files under registry/@{pr_author}/
#   2. YAML files are valid
#   3. Auto-generates index.yaml after merge
#
# Copy this file to: twisker/iphub/.github/workflows/validate-pr.yml

name: Validate PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Publish PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file permissions
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Get changed files
          CHANGED=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --name-only)

          echo "Changed files:"
          echo "$CHANGED"
          echo ""

          # Verify all changed files are under registry/@{author}/
          ALLOWED_PREFIX="registry/@${PR_AUTHOR}/"
          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ ! "$file" == ${ALLOWED_PREFIX}* ]]; then
              VIOLATIONS="${VIOLATIONS}  - ${file}\n"
            fi
          done <<< "$CHANGED"

          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: PR modifies files outside allowed namespace."
            echo "Allowed: ${ALLOWED_PREFIX}*"
            echo -e "Violations:\n${VIOLATIONS}"
            exit 1
          fi

          echo "All files within allowed namespace."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate YAML syntax
        run: |
          CHANGED=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --name-only)

          ERRORS=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.yaml ]] && continue
            if ! python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "ERROR: Invalid YAML: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$CHANGED"

          [ $ERRORS -eq 0 ] || exit 1
          echo "All YAML files valid."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Auto-merge if checks pass
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash --auto
        env:
          GH_TOKEN: ${{ github.token }}

  # After merge: rebuild index.yaml
  rebuild-index:
    name: Rebuild Index
    needs: validate
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate index.yaml from registry
        run: |
          python3 - << 'SCRIPT'
          import yaml
          from pathlib import Path

          index = {"skills": {}, "packages": {}}

          registry = Path("registry")
          if not registry.exists():
              yaml.dump(index, open("index.yaml", "w"), sort_keys=False)
              exit(0)

          for owner_dir in sorted(registry.iterdir()):
              if not owner_dir.is_dir():
                  continue
              owner = owner_dir.name  # e.g. @twisker

              for item in sorted(owner_dir.iterdir()):
                  if item.is_file() and item.suffix == ".yaml":
                      # Skill registration
                      data = yaml.safe_load(item.read_text())
                      if not data:
                          continue
                      name = data.get("name", item.stem)
                      section = "skills"
                      entry = {
                          "owner": owner,
                          "type": data.get("type", "skill"),
                          "description": data.get("description", ""),
                      }
                      if "agents" in data:
                          entry["agents"] = list(data["agents"].keys())
                      if "risk_level" in data:
                          entry["risk_level"] = data["risk_level"]
                      index[section][name] = entry

                  elif item.is_dir():
                      # IP package (directory with meta.yaml)
                      meta_file = item / "meta.yaml"
                      if not meta_file.exists():
                          continue
                      meta = yaml.safe_load(meta_file.read_text())
                      if not meta:
                          continue
                      name = meta.get("name", item.name)
                      versions = sorted(
                          [f.stem for f in item.glob("*.yaml")
                           if f.name != "meta.yaml"],
                          reverse=True,
                      )
                      entry = {
                          "owner": owner,
                          "type": "ip",
                          "description": meta.get("description", ""),
                          "latest": versions[0] if versions else "",
                          "versions": versions,
                      }
                      if "risk_level" in meta:
                          entry["risk_level"] = meta["risk_level"]
                      index["packages"][name] = entry

          with open("index.yaml", "w") as f:
              f.write("# IpHub Index — auto-generated\n")
              yaml.dump(index, f, default_flow_style=False,
                        allow_unicode=True, sort_keys=False)
          SCRIPT

      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml
          git diff --cached --quiet || git commit -m "chore: rebuild index.yaml [skip ci]"
          git push
