# GitHub Actions workflow for twisker/iphub repo
# Validates and auto-merges publish PRs
#
# Checks:
#   1. PR only modifies files under registry/@{pr_author}/
#   2. YAML files are valid
#   3. Auto-generates index.yaml after merge
#
# Copy this file to: twisker/iphub/.github/workflows/validate-pr.yml

name: Validate PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Publish PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file permissions
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Get changed files
          CHANGED=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --name-only)

          echo "Changed files:"
          echo "$CHANGED"
          echo ""

          # Verify all changed files are under registry/@{author}/
          ALLOWED_PREFIX="registry/@${PR_AUTHOR}/"
          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ ! "$file" == ${ALLOWED_PREFIX}* ]]; then
              VIOLATIONS="${VIOLATIONS}  - ${file}\n"
            fi
          done <<< "$CHANGED"

          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: PR modifies files outside allowed namespace."
            echo "Allowed: ${ALLOWED_PREFIX}*"
            echo -e "Violations:\n${VIOLATIONS}"
            exit 1
          fi

          echo "All files within allowed namespace."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate YAML syntax
        run: |
          CHANGED=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --name-only)

          ERRORS=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != *.yaml ]] && continue
            if ! python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
              echo "ERROR: Invalid YAML: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$CHANGED"

          [ $ERRORS -eq 0 ] || exit 1
          echo "All YAML files valid."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Merge PR
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash --admin
        env:
          GH_TOKEN: ${{ github.token }}

  # Index rebuild is handled by rebuild-index.yml (triggered on push to main)
